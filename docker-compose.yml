# ──────────────────────────────────────────────
# Centralita Virtual Ayuntamiento
# docker-compose.yml
# ──────────────────────────────────────────────
version: "3.8"

services:
  # ── MongoDB ────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: centralita-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - centralita-network

  # ── Backend (FastAPI) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: centralita-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      - MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo
    ports:
      - "8001:8001"
    networks:
      - centralita-network

  # ── Frontend (React + Nginx) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://tu-dominio.com}
    container_name: centralita-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - centralita-network

volumes:
  mongo-data:

networks:
  centralita-network:
    driver: bridge
